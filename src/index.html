<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fib Sphere</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <canvas class="webgl"></canvas>
    <div class="wavelength" id="wavelength">wv</div>
    <script type="module" src="./script.js"></script>
    <input class="drone-gain-range" type="range" id="drone-volume" min="0" max="3" value="2.2" step="0.01"/>
   
    <input class="pad-gain-range" type="range" id="pad-volume" min="0" max="6" value="5" step="0.01"/>
    <div class="drum-machine-controls" id="controls">
        <div class="controls" id="lead-controls">
             <label for="number-of-pulses"></label>
                <input id="lead-pulses-input" type="number" name="quantity" min="2" max="12" step="1" value="8">
             <input class="lead-gain-range" type="range" id="lead-volume" min="0" max="1" value=".3" step="0.01"/>
        </div>
        
    </div>
</body>
</html>
