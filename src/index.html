<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fib Sphere</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <canvas class="webgl"></canvas>
    <!-- <div class="wavelength" id="wavelength">wv</div> -->
    <script type="module" src="./script.js"></script>
    <div class="instrument-controls" id="controls">
        <div class="circle-UI-container">
            <div class="instrument-title">LEAD</div>
            <div class="controls" id="lead-controls"></div>
            <label for="number-of-pulses"></label>
            <input id="lead-pulses-input" class="instrument-pulses-input" type="number" name="quantity" min="2" max="12" step="1" value="8">
            <input class="gain-range" type="range" id="lead-volume" min="0" max="1" value=".4" step="0.01"/>
        </div>
        <div class="circle-UI-container">
            <div class="instrument-title">PAD</div>
            <div class="controls" id="pad-controls"></div>
            <label for="number-of-pulses"></label>
            <input id="pad-pulses-input" class="instrument-pulses-input" type="number" name="quantity" min="2" max="12" step="1" value="8">
            <input class="gain-range" type="range" id="pad-volume" min="0" max="2" value="1.5" step="0.01"/>
        </div>
        <div class="circle-UI-container">
            <div class="instrument-title">BASS</div>
            <div class="controls" id="bass-controls"></div>
            <label for="number-of-pulses"></label>
            <input id="bass-pulses-input" class="instrument-pulses-input" type="number" name="quantity" min="2" max="12" step="1" value="5">
            <input class="gain-range" type="range" id="bass-volume" min="0" max="2" value="0.5" step="0.01"/>
        </div>
    </div>
</body>
</html>
